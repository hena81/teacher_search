{% extends 'base.html' %}

{% block title %}تسجيل الدخول - نظام توزيع الملاحظين{% endblock %}

{% block content %}
<div class="max-w-md mx-auto mt-10">
    <!-- Login Card -->
    <div class="bg-white/70 backdrop-blur-xl rounded-3xl shadow-2xl p-8 md:p-10 border border-white/50 animate-fade-in-up">
        <!-- Header -->
        <div class="text-center mb-8">
            <div
                class="bg-gradient-to-br from-primary-500 to-primary-700 rounded-full p-4 w-20 h-20 mx-auto mb-5 flex items-center justify-center shadow-lg shadow-primary-500/30">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-10 w-10 text-white" fill="none" viewBox="0 0 24 24"
                    stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z" />
                </svg>
            </div>
            <h2 class="text-2xl font-bold text-blue-800 mb-2">تسجيل الدخول</h2>
            <p class="text-gray-600">أدخل بياناتك للوصول لصفحة رفع البيانات</p>
        </div>

        <!-- Login Form -->
        <form method="POST" action="{{ url_for('login') }}" class="space-y-6">
            {{ form.hidden_tag() }}

            <!-- Civil ID Field -->
            <div>
                <label for="civil_no" class="block text-sm font-bold text-slate-700 mb-2 px-1">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 inline-block ml-1 text-primary-600" fill="none"
                        viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M10 6H5a2 2 0 00-2 2v9a2 2 0 002 2h14a2 2 0 002-2V8a2 2 0 00-2-2h-5m-4 0V5a2 2 0 114 0v1m-4 0a2 2 0 104 0m-5 8a2 2 0 100-4 2 2 0 000 4zm0 0c1.306 0 2.417.835 2.83 2M9 14a3.001 3.001 0 00-2.83 2M15 11h3m-3 4h2" />
                    </svg>
                    الرقم المدني
                </label>
                <input type="text" name="civil_no" id="civil_no"
                    class="w-full px-4 py-3 bg-white/80 border border-slate-200 rounded-xl focus:border-primary-500 focus:ring-4 focus:ring-primary-100 transition-all text-lg shadow-inner outline-none"
                    placeholder="أدخل الرقم المدني" value="{{ request.form.get('civil_no', '') }}" required>
            </div>

            <!-- Password Field -->
            <div>
                <label for="password" class="block text-sm font-bold text-slate-700 mb-2 px-1">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 inline-block ml-1 text-primary-600" fill="none"
                        viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M15 7a2 2 0 012 2m4 0a6 6 0 01-7.743 5.743L11 17H9v2H7v2H4a1 1 0 01-1-1v-2.586a1 1 0 01.293-.707l5.964-5.964A6 6 0 1121 9z" />
                    </svg>
                    كلمة المرور
                </label>
                <input type="password" name="password" id="password"
                    class="w-full px-4 py-3 bg-white/80 border border-slate-200 rounded-xl focus:border-primary-500 focus:ring-4 focus:ring-primary-100 transition-all text-lg shadow-inner outline-none"
                    placeholder="أدخل كلمة المرور" required>
            </div>

            <!-- Submit Button -->
            <button type="submit"
                class="w-full px-6 py-4 bg-gradient-to-l from-primary-600 to-primary-800 text-white font-bold rounded-2xl shadow-lg shadow-primary-500/30 hover:shadow-primary-500/50 hover:from-primary-700 hover:to-primary-900 transition-all transform hover:-translate-y-1 focus:ring-4 focus:ring-primary-200 text-lg flex items-center justify-center gap-2">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none"
                    viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M11 16l-4-4m0 0l4-4m-4 4h14m-5 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h7a3 3 0 013 3v1" />
                </svg>
                تسجيل الدخول
            </button>
        </form>

        <!-- Info Box -->
        <div class="mt-8 p-4 bg-primary-50/80 rounded-xl border border-primary-100 flex items-center justify-center gap-2">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 text-primary-600" fill="none"
                viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                    d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
            </svg>
            <p class="text-sm text-primary-800 font-medium">
                هذه الصفحة مخصصة للمسؤولين فقط
            </p>
        </div>
    </div>

    <!-- Back to Search Link -->
    <div class="text-center mt-8">
        <a href="{{ url_for('search') }}" class="text-slate-500 hover:text-primary-600 font-medium transition-colors flex items-center justify-center gap-2 group">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 group-hover:-translate-x-1 transition-transform" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18" />
            </svg>
            العودة لصفحة البحث
        </a>
    </div>
</div>
{% endblock %}
